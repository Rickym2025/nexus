<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurazione Assistente | NexusAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #030307;
            color: #f4f4f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .glass-panel {
            backdrop-filter: blur(16px);
            background: rgba(10, 10, 15, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col justify-center items-center p-6 relative">

    <!-- Sfondo Sfumato Estetico -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-cyan-500/10 blur-[120px] rounded-full pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/10 blur-[120px] rounded-full pointer-events-none"></div>

    <div class="max-w-md w-full p-8 glass-panel rounded-[2rem] relative z-10 border border-white/10 shadow-2xl">
        <div class="text-center mb-8">
            <img src="logo_nexus_bg.png" alt="NexusAI Logo" class="w-12 h-12 mx-auto mb-4 animate-pulse">
            <h1 class="text-2xl font-black text-white uppercase tracking-wider">Configura il tuo Bot</h1>
            <p class="text-xs text-zinc-400 mt-2">Personalizza l'assistente sul tuo sito in tempo reale, senza toccare il codice.</p>
        </div>

        <form id="config-form" onsubmit="saveConfiguration(event)" class="space-y-5">
            <!-- ID del Bot (Disabilitato, viene preso in automatico dall'URL) -->
            <div>
                <label class="block text-[10px] uppercase font-bold tracking-widest text-zinc-400 mb-1.5">ID Identificativo Bot</label>
                <input type="text" id="bot-id" readonly required
                    class="w-full bg-zinc-950/50 border border-zinc-800 text-zinc-500 rounded-xl px-4 py-3 text-sm outline-none cursor-not-allowed font-mono">
            </div>

            <!-- Nome del Bot -->
            <div>
                <label class="block text-[10px] uppercase font-bold tracking-widest text-zinc-300 mb-1.5">Nome dell'Assistente (es. Elena)</label>
                <input type="text" id="bot-name" required placeholder="Inserisci il nome del bot..."
                    class="w-full bg-black border border-zinc-850 text-white rounded-xl px-4 py-3 text-sm outline-none focus:border-cyan-500 transition-colors">
            </div>

            <!-- Colore Hex del Brand -->
            <div>
                <label class="block text-[10px] uppercase font-bold tracking-widest text-zinc-300 mb-1.5">Colore Brand Hex (senza #)</label>
                <div class="flex gap-2">
                    <input type="text" id="bot-color" required maxlength="6" placeholder="es. 06b6d4" oninput="updateColorPicker(this.value)"
                        class="flex-1 bg-black border border-zinc-850 text-white rounded-xl px-4 py-3 text-sm outline-none focus:border-cyan-500 transition-colors font-mono">
                    <!-- Color picker visivo che si aggiorna in sincrono -->
                    <input type="color" id="color-picker" oninput="updateColorHex(this.value)"
                        class="w-12 h-12 bg-black border border-zinc-850 rounded-xl cursor-pointer p-1">
                </div>
            </div>

            <!-- Regole Personalizzate -->
            <div>
                <label class="block text-[10px] uppercase font-bold tracking-widest text-zinc-300 mb-1.5">Regole e Informazioni Speciali</label>
                <textarea id="bot-rules" required rows="4" placeholder="Inserisci orari, FAQ, prezzi ed informazioni che l'assistente deve conoscere per rispondere ai tuoi clienti..."
                    class="w-full bg-black border border-zinc-850 text-white rounded-xl px-4 py-3 text-sm outline-none focus:border-cyan-500 transition-colors resize-none"></textarea>
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-white text-black font-black py-4 rounded-xl text-xs uppercase tracking-widest hover:bg-neutral-200 transition active:scale-95">
                Salva Modifiche →
            </button>
        </form>

        <!-- Schermata di Successo -->
        <div id="success-screen" class="hidden text-center py-8 space-y-4">
            <span class="text-4xl">✨</span>
            <h3 class="text-lg font-bold text-white">Configurazione Salvata!</h3>
            <p class="text-xs text-zinc-400">Le modifiche sono state registrate. Il chatbot sul tuo sito web si è già aggiornato in tempo reale con le nuove impostazioni.</p>
            <button onclick="window.close()" class="text-[10px] border border-white/20 text-white px-4 py-2 rounded-full hover:bg-white/10 transition">Chiudi Finestra</button>
        </div>
    </div>

    <script>
        // Legge automaticamente il bot_id dall'URL (es: config.html?bot_id=hotel_123)
        const urlParams = new URLSearchParams(window.location.search);
        const botId = urlParams.get('bot_id');

        document.addEventListener('DOMContentLoaded', () => {
            if (botId) {
                document.getElementById('bot-id').value = botId;
            } else {
                alert("Errore: ID del bot mancante nell'indirizzo URL. Impossibile configurare.");
                document.getElementById('submit-btn').disabled = true;
            }
        });

        // Sincronizza input di testo con color picker
        function updateColorPicker(val) {
            if (val.length === 6) {
                document.getElementById('color-picker').value = '#' + val;
            }
        }

        function updateColorHex(val) {
            document.getElementById('bot-color').value = val.replace('#', '');
        }

        // Invia i dati direttamente a n8n
        async function saveConfiguration(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Salvataggio in corso...';

            const payload = {
                bot_id: document.getElementById('bot-id').value.trim(),
                nome_bot: document.getElementById('bot-name').value.trim(),
                colore_hex: document.getElementById('bot-color').value.trim(),
                regole_custom: document.getElementById('bot-rules').value.trim()
            };

            try {
                const res = await fetch('https://n8n.rmstudio.app/webhook/nexus-config-update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    document.getElementById('config-form').classList.add('hidden');
                    document.getElementById('success-screen').classList.remove('hidden');
                } else {
                    alert("Errore durante il salvataggio dei dati su n8n. Riprova.");
                }
            } catch (err) {
                alert("Errore di rete. Controlla la connessione.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Salva Modifiche →';
            }
        }
    </script>
</body>
</html>
